<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoDarkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.70 0.22 240);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.60 0.20 240);stop-opacity:1" />
    </linearGradient>
    <filter id="shadowDark">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Circle with Gradient -->
  <circle cx="100" cy="100" r="90" fill="url(#logoDarkGradient)" filter="url(#shadowDark)"/>

  <!-- Synapse Symbol - Connected Nodes -->
  <g fill="white" opacity="1">
    <!-- Central Node -->
    <circle cx="100" cy="100" r="18"/>

    <!-- Top Node -->
    <circle cx="100" cy="50" r="12"/>

    <!-- Bottom Node -->
    <circle cx="100" cy="150" r="12"/>

    <!-- Left Node -->
    <circle cx="55" cy="100" r="12"/>

    <!-- Right Node -->
    <circle cx="145" cy="100" r="12"/>

    <!-- Connection Lines -->
    <line x1="100" y1="82" x2="100" y2="62" stroke="white" stroke-width="4" opacity="0.7"/>
    <line x1="100" y1="118" x2="100" y2="138" stroke="white" stroke-width="4" opacity="0.7"/>
    <line x1="82" y1="100" x2="67" y2="100" stroke="white" stroke-width="4" opacity="0.7"/>
    <line x1="118" y1="100" x2="133" y2="100" stroke="white" stroke-width="4" opacity="0.7"/>
  </g>
</svg>
